name: Tests

on:
  push:
    branches: [main, phase-2-belief-layer, usability-sprint]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Download spaCy en_core_web_sm (needed by NER tests)
        run: uv run python -m spacy download en_core_web_sm

      - name: Pre-download sentence-transformers MiniLM (needed by phase 1 tests)
        # Python-version-specific runner caches mean this needs to happen
        # before the test step regardless of what the other matrix leg has
        # cached. Without this, tests/test_phase1_bridge.py and
        # tests/test_memory_api.py::TestRememberRecall fail intermittently
        # with "couldn't connect to huggingface.co" when HF is rate-limiting.
        run: uv run python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Lint (ruff)
        run: uv run ruff check src/ eval/ tests/
        continue-on-error: true

      - name: Run test suite (fast tests only)
        env:
          # Skip tests that download heavy NLI / embedder models in CI
          # to keep the run under 10 min. Slow tests still run locally.
          PATHA_CI_SKIP_HEAVY: "1"
        run: uv run pytest tests/ -q -m "not slow"

      - name: Verify wheel builds
        run: uv build

      - name: Verify bundled classifier in wheel
        # Wheel filename uses the PyPI distribution name "patha_memory"
        # (with underscore), per PEP 491; import name stays "patha".
        run: |
          wheel=$(ls dist/patha_memory-*.whl | head -1)
          unzip -l "$wheel" | grep supersession_classifier.joblib

  smoke-test:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --extra dev --extra mcp
      - run: uv run python -m spacy download en_core_web_sm

      - name: Smoke test — CLI commands work
        run: |
          uv run patha --help
          uv run patha verify
          uv run patha stats

      - name: Smoke test — Memory API loads and works end-to-end
        run: |
          uv run python -c "
          import patha, tempfile
          td = tempfile.mkdtemp()
          m = patha.Memory(path=f'{td}/beliefs.jsonl', detector='stub', enable_phase1=False)
          m.remember('I live in Lisbon')
          rec = m.recall('where do I live?')
          assert 'Lisbon' in rec.summary, f'expected Lisbon in {rec.summary!r}'
          print('OK: Memory API end-to-end works')
          "

      - name: Smoke test — MCP server initializes on stdio
        # The existing pytest test in tests/test_mcp_protocol.py
        # already spawns the server via sys.executable (not 'python'),
        # does the full initialize + list tools + call all 4 tools +
        # verify persistence. Run it here as the smoke test.
        run: uv run pytest tests/test_mcp_protocol.py -v -m slow
